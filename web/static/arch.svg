<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" fill="#0f1419"/>

  <!-- Browser -->
  <rect x="30" y="160" width="140" height="80" rx="12" fill="#1a1f25" stroke="#2f3336" stroke-width="2"/>
  <text x="100" y="195" text-anchor="middle" fill="#e8e8e8" font-family="system-ui" font-size="14" font-weight="600">浏览器</text>
  <text x="100" y="218" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="11">上传图片 / 提取水印</text>

  <!-- Web Server -->
  <rect x="250" y="160" width="140" height="80" rx="12" fill="#1a1f25" stroke="#00e5a0" stroke-width="2"/>
  <text x="320" y="195" text-anchor="middle" fill="#e8e8e8" font-family="system-ui" font-size="14" font-weight="600">Web 服务</text>
  <text x="320" y="218" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="11">Flask API</text>

  <!-- Lambda Embed -->
  <rect x="480" y="90" width="140" height="80" rx="12" fill="#1a1f25" stroke="#2f3336" stroke-width="2"/>
  <text x="550" y="122" text-anchor="middle" fill="#00e5a0" font-family="system-ui" font-size="13" font-weight="600">Lambda</text>
  <text x="550" y="145" text-anchor="middle" fill="#e8e8e8" font-family="system-ui" font-size="14" font-weight="600">嵌入水印</text>
  <text x="550" y="162" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="10">DCT 频域编码</text>

  <!-- Lambda Extract -->
  <rect x="480" y="230" width="140" height="80" rx="12" fill="#1a1f25" stroke="#2f3336" stroke-width="2"/>
  <text x="550" y="262" text-anchor="middle" fill="#00e5a0" font-family="system-ui" font-size="13" font-weight="600">Lambda</text>
  <text x="550" y="285" text-anchor="middle" fill="#e8e8e8" font-family="system-ui" font-size="14" font-weight="600">提取水印</text>
  <text x="550" y="302" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="10">多数投票解码</text>

  <!-- S3 -->
  <rect x="700" y="90" width="80" height="80" rx="12" fill="#1a1f25" stroke="#2f3336" stroke-width="2"/>
  <text x="740" y="128" text-anchor="middle" fill="#e8e8e8" font-family="system-ui" font-size="14" font-weight="600">S3</text>
  <text x="740" y="150" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="11">原始图片</text>

  <!-- Arrows: Browser -> Web -->
  <line x1="170" y1="200" x2="245" y2="200" stroke="#00e5a0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Web -> Lambda Embed -->
  <line x1="390" y1="185" x2="475" y2="140" stroke="#8899a6" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="420" y="148" fill="#8899a6" font-family="system-ui" font-size="10">嵌入</text>

  <!-- Arrows: Web -> Lambda Extract -->
  <line x1="390" y1="215" x2="475" y2="260" stroke="#8899a6" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="420" y="255" fill="#8899a6" font-family="system-ui" font-size="10">提取</text>

  <!-- Arrows: Lambda Embed -> S3 -->
  <line x1="620" y1="130" x2="695" y2="130" stroke="#8899a6" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="655" y="120" fill="#8899a6" font-family="system-ui" font-size="10">读取</text>

  <!-- Flow description at bottom -->
  <rect x="30" y="350" width="740" height="50" rx="8" fill="#1a1f25" stroke="#2f3336" stroke-width="1"/>
  <text x="400" y="373" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="12">
    流程：上传图片 + 用户ID → 嵌入不可见水印 → 返回含水印图片 → 上传可疑图片 → 提取隐藏的用户ID
  </text>
  <text x="400" y="391" text-anchor="middle" fill="#8899a6" font-family="system-ui" font-size="11">
    水印不可见 | 抗 JPEG 压缩 | 无需原图即可提取
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#00e5a0" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#8899a6" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
